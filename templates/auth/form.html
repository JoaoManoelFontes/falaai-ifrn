<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'dist/input.css' %}">
</head>
<body class="min-h-screen flex items-center justify-center bg-gray-50">
  <main class="w-full max-w-sm bg-white shadow-md rounded-md p-6">
    <h1 class="text-2xl font-semibold text-gray-800 mb-6">Entrar</h1>

    <form method="post" action="">
      {% csrf_token %}

      <div class="mb-4">
        <label for="id_matricula" class="block text-sm font-medium text-gray-700">Matrícula</label>
        <input
          type="text"
          id="id_matricula"
          name="matricula"
          required
          autocomplete="username"
          class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500"
          placeholder="Digite sua matrícula"
        />
      </div>

      <div class="mb-6">
        <label for="id_senha" class="block text-sm font-medium text-gray-700">Senha</label>
        <input
          type="password"
          id="id_senha"
          name="senha"
          required
          autocomplete="current-password"
          class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500"
          placeholder="Digite sua senha"
        />
      </div>

      <button
        type="submit"
        class="w-full inline-flex justify-center items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500"
      >
        Entrar
      </button>
    </form>
  </main>
</body>
</html>
