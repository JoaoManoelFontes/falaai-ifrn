services:
  db:
    container_name: falaai_db
    image: postgres:15.5
    env_file:
      - ./.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: America/Sao_Paulo
    ports:
      - ${POSTGRES_PORT}:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    volumes:
      - falaai_db_data:/var/lib/postgresql/data

  web:
    container_name: falaai_web
    build: .
    command:
      - gunicorn
      - -c
      - gunicorn/gunicorn.conf.py
      - core.wsgi:application
    env_file: .env.prod
    depends_on:
      - db
    # healthcheck:
    #   test:
    #     [
    #       "CMD-SHELL",
    #       'python -c ''import urllib.request; urllib.request.urlopen("http://localhost:8000/").read()''',
    #     ]
    #   interval: 15s
    #   timeout: 5s
    #   retries: 3
    #   start_period: 15s
    restart: unless-stopped
    volumes:
      - staticfiles_volume:/app/staticfiles
      - media_volume:/app/media

  nginx:
    container_name: falaai_nginx
    image: nginx:1.29.0-alpine
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - staticfiles_volume:/staticfiles
      - media_volume:/media
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/certs:/etc/nginx/certs:ro
      # - ./certbot/conf:/etc/letsencrypt
      # - ./certbot/www:/var/www/certbot
    depends_on:
      web:
        condition: service_started
    restart: unless-stopped

volumes:
  falaai_db_data:
    driver: local
  staticfiles_volume:
  media_volume:
